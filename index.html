<!DOCTYPE html>
<html lang="en">
<head>
<meta name="theme-color" content="#0f172a">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construction Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- APP HEADER -->
<header class="app-header">
    <h1>🏗 BuildCalc Pro</h1>
</header>

<!-- MAIN CONTENT -->
<div class="container">

    <!-- FLOOR -->
    <div class="card">
        <h2>Floors</h2>
        <input type="number" id="floorCount" min="1" max="10" value="1">
    </div>

    <!-- COST -->
    <div class="card">
        <h2>Construction Type</h2>
        <select id="costType">
            <option value="2800">Normal</option>
            <option value="4000">Premium</option>
            <option value="5500">Luxury</option>
        </select>
    </div>

    <!-- FLOORS -->
    <div id="floors-container"></div>

</div>

<!-- BOTTOM APP BAR -->
<div class="bottom-bar">
    <div>
        <small>Total Area</small>
        <strong id="totalArea">0 sq.ft</strong>
    </div>

    <div>
        <small>Estimated Cost</small>
        <strong id="totalCost">Rs. 0</strong>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
